name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ontheit
          key: ${{ secrets.EEC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ontheit/frontend
            ./deploy.sh
